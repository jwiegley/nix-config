name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  nix-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: Check Nix formatting
        run: nix shell nixpkgs#nixfmt -c bash -c 'find . -name "*.nix" -not -path "./result/*" | xargs nixfmt --check'

  nix-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: Lint Nix (statix)
        run: nix shell nixpkgs#statix -c statix check .
      - name: Check dead Nix code
        run: nix shell nixpkgs#deadnix -c deadnix --no-lambda-arg --no-lambda-pattern-names --no-underscore --fail .

  shell-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: Lint shell scripts
        run: |
          nix shell nixpkgs#shellcheck -c bash -c '
            for f in bin/de bin/u bin/upgrade bin/update-agents bin/myhost bin/git-sha \
                     bin/move-audio-files bin/persona bin/yubikey-switch build; do
              shellcheck --severity=warning "$f"
            done
          '
      - name: Check shell formatting
        run: |
          nix shell nixpkgs#shfmt -c bash -c '
            for f in bin/de bin/u bin/upgrade bin/update-agents bin/myhost bin/git-sha \
                     bin/move-audio-files bin/persona bin/yubikey-switch build; do
              shfmt -i 4 -d "$f"
            done
          '

  python-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: Lint Python
        run: |
          nix shell nixpkgs#ruff -c ruff check \
            bin/agent-deck-litellm-env-test.py \
            bin/codex-litellm-test.py \
            bin/update-overlay \
            bin/update-overlay-test.py
      - name: Run focused Python tests
        run: python3 -m unittest -v bin/update-overlay-test.py

  portable-eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: Evaluate every portable AI system
        run: nix flake check ./config/ai --all-systems --no-build

  portable-native:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            system: aarch64-darwin
          - runner: ubuntu-24.04-arm
            system: aarch64-linux
          - runner: ubuntu-latest
            system: x86_64-linux
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: Build and load the Pi extension gallery
        run: nix build --no-link "./config/ai#checks.${{ matrix.system }}.pi-gallery"
