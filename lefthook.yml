pre-commit:
  parallel: true
  commands:
    nix-format:
      glob: "*.nix"
      run: find . -name '*.nix' -not -path './result/*' | xargs nixfmt --check
    nix-lint:
      glob: "*.nix"
      run: statix check .
    nix-deadcode:
      glob: "*.nix"
      run: deadnix --no-lambda-arg --no-lambda-pattern-names --no-underscore --fail .
    shell-lint:
      glob: "*.{sh,bash}"
      run: |
        for f in bin/*; do
          if [[ $f != bin/nix-shell-sample && \
                $f != bin/update-overlay \
             ]]; then
            shellcheck --severity=warning "$f"
          fi
        done
    shell-format:
      glob: "*.{sh,bash}"
      run: |
        for f in bin/*; do
          if [[ $f != bin/nix-shell-sample && \
                $f != bin/update-overlay \
             ]]; then
             shfmt -i 4 -d "$f"
          fi
        done
    python-lint:
      glob: "*.py"
      run: ruff check bin/update-overlay
    # nix-check:
    #   glob: "*.{nix,lock}"
    #   run: nix flake check --no-warn-dirty 2>&1
