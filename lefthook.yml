pre-commit:
  parallel: true
  commands:
    nix-format:
      glob: "*.nix"
      run: find . -name '*.nix' -not -path './result/*' | xargs nixfmt --check
    nix-lint:
      glob: "*.nix"
      run: statix check .
    nix-deadcode:
      glob: "*.nix"
      run: deadnix --no-lambda-arg --no-lambda-pattern-names --no-underscore --fail .
    shell-lint:
      glob: "{bin/*,build,*.sh,*.bash}"
      run: |
        for f in bin/* build; do
          [[ -f $f ]] || continue
          if head -1 "$f" | grep -q bash; then
            shellcheck --severity=warning "$f"
          fi
        done
    shell-format:
      glob: "{bin/*,build,*.sh,*.bash}"
      run: |
        for f in bin/* build; do
          [[ -f $f ]] || continue
          if head -1 "$f" | grep -q bash; then
            shfmt -i 4 -d "$f"
          fi
        done
    python-lint:
      glob: "{*.py,bin/update-overlay}"
      run: |
        ruff check \
          bin/agent-deck-litellm-env-test.py \
          bin/codex-litellm-test.py \
          bin/update-overlay \
          bin/update-overlay-test.py
        python3 -m unittest -v bin/update-overlay-test.py
